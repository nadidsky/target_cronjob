# =============================================================================
# target_job.conf — TARGET Closing Days Report Runner — Configuration
# =============================================================================
#
# This file is sourced (not executed) by target_job_bash.sh / target_job_sh.sh
# Standard KEY="VALUE" shell syntax. Lines starting with # are comments.
#
# Install to: /etc/target_job/target_job.conf
# Override path with: target_job.sh -c /path/to/other.conf
#
# After editing this file, no restart or recompilation is needed —
# the next cron tick will pick up the new values automatically.
# =============================================================================


# -----------------------------------------------------------------------------
# JOB_COMMAND
# The executable to run. It receives dates as arguments (oldest first):
#   e.g.  my_report_job 2025-04-18 2025-04-19 2025-04-20 2025-04-22
# -----------------------------------------------------------------------------
JOB_COMMAND="/usr/local/bin/my_report_job"


# -----------------------------------------------------------------------------
# TRIGGER_HOUR / TRIGGER_MINUTE
# The job will not run before this time each day (24h format).
# Every cron tick before this time is a silent exit.
# -----------------------------------------------------------------------------
TRIGGER_HOUR=19
TRIGGER_MINUTE=30


# -----------------------------------------------------------------------------
# ANCHOR_DATE  (format: YYYY-MM-DD)
# Earliest date ever included in a run. On the first ever execution
# (empty state file) the date range starts here. Set this to the first
# business day you want covered.
# -----------------------------------------------------------------------------
ANCHOR_DATE="2025-01-01"


# -----------------------------------------------------------------------------
# RUN_DIR
# Directory for all runtime files: lock, state log, execution log.
# Must be writable by the user running the cron job.
# -----------------------------------------------------------------------------
RUN_DIR="/var/lib/target_job"


# -----------------------------------------------------------------------------
# MAX_LOG_SIZE  (bytes)
# Log file size threshold for rotation. The current log is moved to
# target_job.log.1 when this size is exceeded. Default: 10 MB.
# -----------------------------------------------------------------------------
MAX_LOG_SIZE=10485760