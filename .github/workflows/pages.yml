name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'README.md'
      - '.github/workflows/pages.yml'
      - '.github/scripts/render_site.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Pygments
        run: pip install --quiet pygments

      - name: Render syntax-highlighted site
        run: python .github/scripts/render_site.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # The 'github-pages' environment is auto-created when you enable GitHub Pages
    # in repository Settings → Pages → Source: "GitHub Actions".
    # The VS Code GitHub Actions extension may flag this as unknown until the
    # environment exists in the repo; the workflow is correct as-is.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
